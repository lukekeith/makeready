name: Promote to Production

# Promotion model (Web): build-once / image promotion.
#   build-web-image.yml builds the client image, pushes it to GHCR, and deploys
#   it to STAGING. This workflow then promotes the EXACT image staging is
#   running to PRODUCTION — no rebuild, identical bits. Production has no GitHub
#   source; it only ever runs a published GHCR image.
#
# NOTE: API is NOT yet migrated to image promotion. Its prod service is
# disconnected from GitHub, so the repo-based deploy below will re-ship whatever
# commit Railway last has on record (i.e. it will NOT pick up new code). Migrate
# it to the same GHCR build-once flow before relying on its promotion.
# (Capture is intentionally excluded from this workflow.)
#
# Required secrets:
#   - RAILWAY_API_TOKEN  Railway project token
#   - GHCR_PULL_TOKEN    GitHub PAT (read:packages) so prod can pull the image

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - Web (app.makeready.org)
          - API (api.makeready.org)
          - All
      confirm:
        description: 'Type "promote" to confirm production deployment'
        required: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  PROD_ENV_ID: "47a94190-6ea6-48fd-b9db-9973f4f5912a"
  STG_ENV_ID: "2175d60b-5e6e-49e1-bee1-5a4903ae1920"
  WEB_SERVICE_ID: "6cb4987b-0344-4e4c-85bd-7490eb0e22d1"
  API_SERVICE_ID: "f5dc2315-9c49-4c85-b32d-99418eeba49d"

jobs:
  promote:
    name: Deploy ${{ github.event.inputs.service }} to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'promote'

    steps:
      # Promote the image staging is running to production. We read staging's
      # current source.image (set by build-web-image.yml), point production at
      # the same image (+ pull credentials), and deploy. Identical artifact.
      - name: Promote Web (staging image → production)
        if: contains(github.event.inputs.service, 'Web') || github.event.inputs.service == 'All'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          rw() {
            curl -sf -X POST "https://backboard.railway.com/graphql/v2" \
              -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
              -H "Content-Type: application/json" --data-binary @- > /tmp/rw-resp.json
            if grep -q '"errors"' /tmp/rw-resp.json; then
              echo "::error::Railway mutation failed"; cat /tmp/rw-resp.json; exit 1
            fi
            cat /tmp/rw-resp.json
          }

          echo "Reading the image staging is currently running..."
          IMG=$(jq -n --arg e "$STG_ENV_ID" --arg s "$WEB_SERVICE_ID" \
            '{query:"query($e:String!,$s:String!){serviceInstance(serviceId:$s,environmentId:$e){source{image}}}",variables:{e:$e,s:$s}}' \
            | rw | jq -r '.data.serviceInstance.source.image // empty')

          if [ -z "$IMG" ]; then
            echo "::error::Staging Web has no image source. Run 'Build Web Image' first so staging is on a GHCR image."
            exit 1
          fi
          echo "Promoting image to production: $IMG"

          # 1. Point production at the staging image (+ pull credentials).
          jq -n --arg e "$PROD_ENV_ID" --arg s "$WEB_SERVICE_ID" \
                --arg i "$IMG" --arg u "$GHCR_USER" --arg p "$GHCR_PULL_TOKEN" \
            '{query:"mutation($e:String!,$s:String!,$i:String!,$u:String!,$p:String!){serviceInstanceUpdate(environmentId:$e,serviceId:$s,input:{source:{image:$i},registryCredentials:{username:$u,password:$p}})}",variables:{e:$e,s:$s,i:$i,u:$u,p:$p}}' \
            | rw > /dev/null

          # 2. Deploy it to production.
          jq -n --arg e "$PROD_ENV_ID" --arg s "$WEB_SERVICE_ID" \
            '{query:"mutation($e:String!,$s:String!){serviceInstanceDeployV2(environmentId:$e,serviceId:$s)}",variables:{e:$e,s:$s}}' \
            | rw > /dev/null

          echo "Production Web promotion triggered for $IMG."

      # ── NOT YET MIGRATED ──────────────────────────────────────────────────
      # API still uses a repo-based deploy. Its prod service is disconnected
      # from GitHub, so this re-ships the last commit Railway has on record
      # (stale) until it is moved to the GHCR build-once flow.
      - name: Deploy API (repo-based — not yet migrated)
        if: contains(github.event.inputs.service, 'API') || github.event.inputs.service == 'All'
        run: |
          echo "::warning::API promotion is not migrated to image promotion and may re-ship a stale build."
          curl -sf -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { serviceInstanceDeployV2(environmentId: \\\"$PROD_ENV_ID\\\", serviceId: \\\"$API_SERVICE_ID\\\") }\"}" \
            | tee /tmp/api-response.json
          echo ""
          if grep -q '"errors"' /tmp/api-response.json; then
            echo "::error::API deploy failed"; cat /tmp/api-response.json; exit 1
          fi
          echo "API deploy triggered."
