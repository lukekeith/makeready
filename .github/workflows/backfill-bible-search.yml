name: Backfill Bible Search (doc2query)

# Generates the doc2query questions (Claude Haiku) and embeds every Bible search
# vector — including the new passage_queries rows — against production.
# Both steps are idempotent and resumable, so re-running is safe and resumes
# where a previous run left off.
#
# Runs entirely in CI against the "production" GitHub Environment's scoped
# secrets — never locally. That Environment must define:
#   - DATABASE_URL        public/proxy Postgres URL (runner is outside Railway)
#   - DIRECT_URL          same, used by Prisma
#   - ANTHROPIC_API_KEY   for doc2query question generation
#
# Schema (passage_queries table, GIN/HNSW indexes) is applied automatically on
# deploy — this workflow only fills DATA, so run it AFTER production is deployed.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "production" to confirm'
        required: true

concurrency:
  group: bible-backfill-production
  cancel-in-progress: false

defaults:
  run:
    working-directory: server

jobs:
  backfill:
    name: doc2query backfill (production)
    runs-on: ubuntu-latest
    # Loads the production-scoped secrets and honours its protection rules
    # (e.g. required reviewers).
    environment: production
    timeout-minutes: 90
    steps:
      # Checkout first: the default working-directory (server) only exists once
      # the repo is checked out, and the run steps below rely on it.
      - uses: actions/checkout@v4

      - name: Confirm production
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "production" ]; then
            echo "::error::Confirmation '${{ github.event.inputs.confirm }}' does not match 'production'."
            exit 1
          fi

      - name: Verify environment secrets are present
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          missing=""
          [ -z "$DATABASE_URL" ] && missing="$missing DATABASE_URL"
          [ -z "$ANTHROPIC_API_KEY" ] && missing="$missing ANTHROPIC_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing secret(s) for the 'production' GitHub Environment:$missing. Add DATABASE_URL, DIRECT_URL and ANTHROPIC_API_KEY (public/proxy DB URL) to that Environment."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Generate doc2query questions (resumable)
        run: npx tsx src/scripts/generate-passage-queries.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Embed all Bible search vectors (fills passage_queries)
        run: npx tsx src/scripts/embed-bible.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
