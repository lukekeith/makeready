name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - 'client/**'
      - 'iphone/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/**'
      - 'client/**'
      - 'iphone/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.18.1'

jobs:
  # ─── Client ──────────────────────────────────────────────────────────────────

  client-test:
    name: Client — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, zip, gd, bcmath
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: client/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('client/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: npm-client-${{ runner.os }}-${{ hashFiles('client/package-lock.json') }}
          restore-keys: npm-client-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --optimize-autoloader

      - name: Install NPM dependencies and build assets
        run: npm install --no-audit --no-fund --legacy-peer-deps && npm run build

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHP tests
        run: php artisan test

  client-docker:
    name: Client — Docker Build
    runs-on: ubuntu-latest
    needs: [client-test]
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-client-${{ runner.os }}-${{ hashFiles('client/Dockerfile', 'client/composer.lock', 'client/package-lock.json') }}
          restore-keys: docker-client-${{ runner.os }}-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: client
          load: true
          tags: makeready-client:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Smoke test — Laravel /up health route
        run: |
          docker run -d -p 8080:8080 \
            -e PORT=8080 \
            -e APP_KEY=base64:dGVzdGtleTEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI= \
            -e APP_ENV=testing \
            -e API_URL=https://api.makeready.org \
            -e SESSION_DRIVER=file \
            --name test-container makeready-client:test

          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/up > /dev/null 2>&1; then
              echo "Container ready after ~${i}s"
              break
            fi
            sleep 1
          done

          curl -v http://localhost:8080/up || (docker logs test-container && exit 1)
          docker stop test-container

  # ─── Server ──────────────────────────────────────────────────────────────────

  server-typecheck:
    name: Server — TypeScript Strict Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install --loglevel=verbose

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: TypeScript Strict Mode Check
        run: npx tsc --noEmit --strict

  server-test:
    name: Server — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: makeready_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install --loglevel=verbose

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/makeready_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/makeready_test

      - name: Enable PostgreSQL Extensions
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d makeready_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Setup Test DB Schema
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/makeready_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/makeready_test

      - name: Run Server Tests
        run: npx vitest run --reporter=verbose --exclude='test/integration/production.test.ts' --exclude='test/rate-limit-verification.test.ts'
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/makeready_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/makeready_test
          SESSION_SECRET: test-secret-key
          CLIENT_URL: http://localhost:5173
          PORT: 3001
          TWILIO_ACCOUNT_SID: ACtest00000000000000000000000000
          TWILIO_AUTH_TOKEN: test_auth_token_00000000000000
          TWILIO_VERIFY_SERVICE_ID: VAtest0000000000000000000000000
          TWILIO_PHONE_NUMBER: "+15555555555"
          GOOGLE_CLIENT_ID: test-client-id.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: test-client-secret
          GOOGLE_CALLBACK_URL: http://localhost:3001/auth/google/callback

  server-migration:
    name: Server — Migration Validation
    runs-on: ubuntu-latest
    needs: [server-typecheck, server-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: makeready_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Atlas CLI
        run: |
          curl -sSf https://atlasgo.sh | sh -s -- -y
          echo "$HOME/.atlas/bin" >> $GITHUB_PATH

      - name: Enable PostgreSQL Extensions
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d makeready_migration_test -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
          PGPASSWORD=postgres psql -h localhost -U postgres -d makeready_migration_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run All Atlas Migrations on Fresh DB
        run: |
          cd atlas && atlas migrate apply --env test --url "postgres://postgres:postgres@localhost:5432/makeready_migration_test?sslmode=disable"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/makeready_migration_test

      - name: Validate Migration Status
        run: |
          cd atlas && atlas migrate status --env test --url "postgres://postgres:postgres@localhost:5432/makeready_migration_test?sslmode=disable"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/makeready_migration_test

  server-build:
    name: Server — Build
    runs-on: ubuntu-latest
    needs: [server-typecheck, server-test]
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install --loglevel=verbose

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          DIRECT_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Build TypeScript
        run: npm run build:only

      - uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: server/dist/
