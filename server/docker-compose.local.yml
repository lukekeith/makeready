version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: makeready-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: makeready_dev
    ports:
      - "5434:5432"
    volumes:
      - makeready_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  makeready_postgres_data:
