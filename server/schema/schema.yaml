        target: MemberVideoProgress
    indexes:
      - fields: [lessonScheduleId]
      - fields: [sourceLessonActivityId]
    unique:
      - fields: [lessonScheduleId, orderNumber]

  # ===========================================================================
  # Activity Source Reference (Bible verse metadata for READ activities)
  # ===========================================================================
  ActivitySourceReference:
    table_name: activity_source_references
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      lessonActivityId:
        type: string
        nullable: true
        description: "For program lesson activities"
      scheduledActivityId:
        type: string
        nullable: true
        description: "For enrolled lesson activities"
      sourceType:
        type: string
        description: "SCRIPTURE (future: URL, BOOK)"
      passageReference:
        type: string
        nullable: true
        description: "Romans 1:1-5"
      bookNumber:
        type: int
        nullable: true
        description: "1-66"
      bookName:
        type: string
        nullable: true
      chapterStart:
        type: int
        nullable: true
      chapterEnd:
        type: int
        nullable: true
      verseStart:
        type: int
        nullable: true
      verseEnd:
        type: int
        nullable: true
      createdAt:
        type: datetime
        default: now()
    relations:
      lessonActivity:
        type: many_to_one
        target: LessonActivity
        fields: [lessonActivityId]
        references: [id]
        onDelete: Cascade
        nullable: true
      scheduledActivity:
        type: many_to_one
        target: ScheduledLessonActivity
        fields: [scheduledActivityId]
        references: [id]
        onDelete: Cascade
        nullable: true
      readBlocks:
        type: one_to_many
        target: ActivityReadBlock
    indexes:
      - fields: [lessonActivityId]
      - fields: [scheduledActivityId]
      - fields: [sourceType]

  # ===========================================================================
  # Text Themes (animated rendering themes for read blocks)
  # ===========================================================================
  TextTheme:
    table_name: text_themes
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      name:
        type: string
      slug:
        type: string
        unique: true
      description:
        type: string
        nullable: true
      definition:
        type: json
        description: "Theme definition (colors, animations, styles)"
      fontScale:
        type: float
        nullable: true
        description: "Font size as a fraction of container width (e.g. 0.06 = 6cqw). Drives width-scaled type so a block wraps identically on every screen."
      maxCharacters:
        type: int
        nullable: true
        description: "Max content characters a read block may contain to use this theme. Editors mute the theme when block.content length exceeds this. Null = unlimited."
      isSystem:
        type: boolean
        default: false
      isActive:
        type: boolean
        default: true
      creatorId:
        type: string
        nullable: true
      organizationId:
        type: string
        nullable: true
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      creator:
        type: many_to_one
        target: User
        fields: [creatorId]
        references: [id]
        onDelete: SetNull
        nullable: true
        name: ThemeCreator
      organization:
        type: many_to_one
        target: Organization
        fields: [organizationId]
        references: [id]
        onDelete: SetNull
        nullable: true
      lessonActivities:
        type: one_to_many
        target: LessonActivity
      readBlocks:
        type: one_to_many
        target: ActivityReadBlock
    indexes:
      - fields: [slug]
      - fields: [organizationId]

  # ===========================================================================
  # Activity Read Blocks (multiple text blocks per READ activity)
  # ===========================================================================
  ActivityReadBlock:
    table_name: activity_read_blocks
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      lessonActivityId:
        type: string
        nullable: true
        description: "For program lesson activities"
      scheduledActivityId:
        type: string
        nullable: true
        description: "For enrolled lesson activities"
      orderNumber:
        type: int
        default: 1
        description: "Sort order within the activity"
      title:
        type: string
        nullable: true
        description: "Block title, e.g., 'Romans 1:1-5' for Bible verse blocks"
      content:
        type: text
        nullable: true
        description: "Text/markdown content of this block"
      isLocked:
        type: boolean
        default: false
        description: "Locked blocks cannot be edited (e.g., Bible verses)"
      sourceReferenceId:
        type: string
        nullable: true
        description: "Links to ActivitySourceReference for Bible verse blocks"
      themeId:
        type: string
        nullable: true
        description: "Optional theme for animated rendering"
      contentFormat:
        type: string
        default: "markdown"
        description: "Content format: html or markdown"
      backgroundImageUrl:
        type: string
        nullable: true
      backgroundColor:
        type: string
        nullable: true
        description: "Hex color for block background"
      backgroundOverlayOpacity:
        type: float
        nullable: true
        description: "0-1 opacity for background overlay"
      fontSize:
        type: string
        nullable: true
        description: "Font size: xs, s, m, lg, xl"
      selections:
        type: json
        nullable: true
        description: "Array of styled text spans with start, end, style"
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      lessonActivity:
        type: many_to_one
        target: LessonActivity
        fields: [lessonActivityId]
        references: [id]
        onDelete: Cascade
        nullable: true
      scheduledActivity:
        type: many_to_one
        target: ScheduledLessonActivity
        fields: [scheduledActivityId]
        references: [id]
        onDelete: Cascade
        nullable: true
      sourceReference:
        type: many_to_one
        target: ActivitySourceReference
        fields: [sourceReferenceId]
        references: [id]
        onDelete: SetNull
        nullable: true
      theme:
        type: many_to_one
        target: TextTheme
        fields: [themeId]
        references: [id]
        onDelete: SetNull
        nullable: true
      exegesisHighlights:
        type: one_to_many
        target: ExegesisHighlight
    indexes:
      - fields: [lessonActivityId]
      - fields: [scheduledActivityId]
      - fields: [themeId]

  # ===========================================================================
  # Exegesis Highlights (leader-authored highlights + markdown notes)
  # ===========================================================================
  ExegesisHighlight:
    table_name: exegesis_highlights
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      readBlockId:
        type: string
        description: "FK to ActivityReadBlock (locked scripture block) that this highlight applies to"
      orderNumber:
        type: int
        description: "Stable ordering for highlight navigation"
      start:
        type: int
        description: "Start character offset (plain-text) into the block content"
      end:
        type: int
        description: "End character offset (exclusive)"
      noteMarkdown:
        type: text
        description: "Leader-authored markdown shown to members when they open the highlight"
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      readBlock:
        type: many_to_one
        target: ActivityReadBlock
        fields: [readBlockId]
        references: [id]
        onDelete: Cascade
    indexes:
      - fields: [readBlockId]
      - fields: [readBlockId, orderNumber]
    unique:
      - fields: [readBlockId, orderNumber]
      - fields: [readBlockId, start, end]

  # ===========================================================================
  # Marketing Content
  # ===========================================================================
  FaqItem:
    table_name: faq_items
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      scope:
        type: string
        description: "Page or surface where this FAQ is rendered (home, for-leaders, for-members, about, join-beta)"
      question:
        type: string
      answer:
        type: text
      sortOrder:
        type: int
        default: 0
      isActive:
        type: boolean
        default: true
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    indexes:
      - fields: [scope]
      - fields: [scope, isActive]
      - fields: [scope, sortOrder]
    unique:
      - fields: [scope, question]

  # ===========================================================================
  # Beta Onboarding
  # ===========================================================================
  BetaApplication:
    table_name: beta_applications
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      microsoftId:
        type: string
        unique: true
        description: "Microsoft Entra ID object ID or subject for the authenticated applicant"
      applicantEmail:
        type: string
        unique: true
      applicantName:
        type: string
      applicantPicture:
        type: string
        nullable: true
      phoneNumber:
        type: string
        nullable: true
      organizationName:
        type: string
      organizationWebsite:
        type: string
        nullable: true
      groupMemberAgeRange:
        type: string
      numberOfGroups:
        type: int
      estimatedGroupMembers:
        type: int
      groupDescription:
        type: text
      status:
        type: enum
        enum: BetaApplicationStatus
        default: PENDING
      userId:
        type: string
        nullable: true
      organizationId:
        type: string
        nullable: true
      reviewNotes:
        type: text
        nullable: true
      reviewedAt:
        type: datetime
        nullable: true
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      user:
        type: many_to_one
        target: User
        fields: [userId]
        references: [id]
        onDelete: SetNull
        nullable: true
      organization:
        type: many_to_one
        target: Organization
        fields: [organizationId]
        references: [id]
        onDelete: SetNull
        nullable: true
    indexes:
      - fields: [status]
      - fields: [createdAt]
      - fields: [userId]
      - fields: [organizationId]
      - fields: [microsoftId]
      - fields: [applicantEmail]

  # ===========================================================================
  # Activity Logging
  # ===========================================================================
  ActivityLog:
    table_name: activity_logs
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      category:
        type: enum
        enum: LogCategory
      activityType:
        type: string
        description: "e.g., AUTH_GOOGLE_LOGIN, JOIN_GROUP_REQUEST"
      status:
        type: enum
        enum: LogStatus
      userId:
        type: string
        nullable: true
        description: "User ID for User-authenticated actions"
      memberId:
        type: string
        nullable: true
        description: "Member ID for Member-authenticated actions"
      actorIp:
        type: string
        nullable: true
        description: "IP address for rate-limiting/security"
      userAgent:
        type: string
        nullable: true
        description: "For device tracking"
      route:
        type: string
        description: "e.g., /auth/google/callback"
      method:
        type: string
        description: "HTTP method: GET, POST, etc."
      groupId:
        type: string
        nullable: true
      eventId:
        type: string
        nullable: true
      enrollmentId:
        type: string
        nullable: true
      lessonId:
        type: string
        nullable: true
      organizationId:
        type: string
        nullable: true
      inviteId:
        type: string
        nullable: true
      message:
        type: string
        description: "Human-readable log message"
      errorCode:
        type: string
        nullable: true
        description: "Error code if status is FAILURE"
      errorMessage:
        type: string
        nullable: true
        description: "Error message if status is FAILURE"
      warningMessage:
        type: string
        nullable: true
        description: "Warning message if status is WARNING"
      metadata:
        type: json
        nullable: true
        description: "Additional structured data"
      createdAt:
        type: datetime
        default: now()
    indexes:
      - fields: [category]
      - fields: [activityType]
      - fields: [status]
      - fields: [userId]
      - fields: [memberId]
      - fields: [groupId]
      - fields: [createdAt]
      - fields: [category, createdAt]
      - fields: [activityType, status]

  # ===========================================================================
  # API Keys
  # ===========================================================================
  ApiKey:
    table_name: api_keys
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      keyHash:
        type: string
        unique: true
        description: "SHA-256 hash of full key (irreversible)"
      keyPrefix:
        type: string
        description: "First 8 chars for display (e.g., mr_abc12)"
      name:
        type: string
        description: "Friendly name (e.g., 'Claude Code')"
      description:
        type: string
        nullable: true
      userId:
        type: string
      isActive:
        type: boolean
        default: true
      expiresAt:
        type: datetime
        nullable: true
      lastUsedAt:
        type: datetime
        nullable: true
      usageCount:
        type: int
        default: 0
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      user:
        type: many_to_one
        target: User
        fields: [userId]
        references: [id]
        onDelete: Cascade
    indexes:
      - fields: [userId]
      - fields: [keyPrefix]

  # ===========================================================================
  # Preview Tokens
  # ===========================================================================
  PreviewToken:
    table_name: preview_tokens
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      token:
        type: string
        unique: true
        description: "The preview token string passed as ?preview_token=xxx"
      userId:
        type: string
        unique: true
        description: "One token per user — upsert replaces the old one"
      organizationId:
        type: string
        description: "Org scope — any leader in this org can preview any org content"
      createdAt:
        type: datetime
        default: now()
    relations:
      user:
        type: many_to_one
        target: User
        fields: [userId]
        references: [id]
        onDelete: Cascade
      organization:
        type: many_to_one
        target: Organization
        fields: [organizationId]
        references: [id]
        onDelete: Cascade
      previewStates:
        type: one_to_many
        target: PreviewState
    indexes:
      - fields: [token]
      - fields: [userId]

  # ===========================================================================
  # Preview State (isolated storage for interactive previews)
  # ===========================================================================
  PreviewState:
    table_name: preview_state
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      previewTokenId:
        type: string
        description: "FK to PreviewToken — cascade-deletes when token is replaced"
      entityType:
        type: string
        description: "note | video_progress | exegesis_visit"
      activityId:
        type: string
        description: "The lesson activity this state is for"
      data:
        type: json
        description: "Saved state (note content, video seconds, visited highlight IDs)"
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      previewToken:
        type: many_to_one
        target: PreviewToken
        fields: [previewTokenId]
        references: [id]
        onDelete: Cascade
    indexes:
      - fields: [previewTokenId, entityType, activityId]
        unique: true

  # ===========================================================================
  # Notifications
  # ===========================================================================
  Notification:
    table_name: notifications
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      userId:
        type: uuid
      type:
        type: string
        description: "JOIN_REQUEST, MEMBER_JOINED"
      title:
        type: string
      body:
        type: string
      isRead:
        type: boolean
        default: false
      data:
        type: json
        nullable: true
      createdAt:
        type: datetime
        default: now()
    relations:
      user:
        type: many_to_one
        target: User
        fields: [userId]
        references: [id]
        onDelete: Cascade
    indexes:
      - fields: [userId, isRead]
      - fields: [userId, createdAt]

  # ===========================================================================
  # Activity Ledger (User-Facing Activity Feed)
  # ===========================================================================
  Activity:
    table_name: activities
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      actorId:
        type: string
        description: "User who performed the action"
      action:
        type: enum
        enum: ActivityAction
      resourceType:
        type: string
        description: "GROUP, PROGRAM, LESSON, EVENT, POST, ENROLLMENT, TEMPLATE, MEMBER"
      resourceId:
        type: string
        description: "UUID of affected resource (polymorphic, no FK)"
      resourceName:
        type: string
        description: "Denormalized display name for feed rendering"
      organizationId:
        type: string
        nullable: true
        description: "For scoping feed to an org"
      groupId:
        type: string
        nullable: true
        description: "Group context for group-level feeds"
      targetUserId:
        type: string
        nullable: true
        description: "Target user for directed/notification activities"
      title:
        type: string
        nullable: true
        description: "Display title (for notification-style activities)"
      body:
        type: text
        nullable: true
        description: "Display body (for notification-style activities)"
      isRead:
        type: boolean
        default: false
        description: "Read status for targeted activities"
      metadata:
        type: json
        nullable: true
        description: "Extra context (changed fields, etc.)"
      createdAt:
        type: datetime
        default: now()
    relations:
      actor:
        type: many_to_one
        target: User
        fields: [actorId]
        references: [id]
        name: ActivityActor
        onDelete: Cascade
      group:
        type: many_to_one
        target: Group
        fields: [groupId]
        references: [id]
        name: ActivityGroup
        onDelete: SetNull
        nullable: true
      targetUser:
        type: many_to_one
        target: User
        fields: [targetUserId]
        references: [id]
        name: ActivityTarget
        onDelete: Cascade
        nullable: true
    indexes:
      - fields: [actorId, createdAt]
      - fields: [organizationId, createdAt]
      - fields: [resourceType, resourceId]
      - fields: [createdAt]
      - fields: [groupId, createdAt]
      - fields: [targetUserId, createdAt]
      - fields: [targetUserId, isRead]

  # ===========================================================================
  # Membership Events (immutable audit trail of every membership transition)
  # ===========================================================================
  MembershipEvent:
    table_name: membership_events
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      memberId:
        type: string
        description: "The member this event concerns (canonical identity)"
      groupId:
        type: string
        nullable: true
        description: "Group context; null for org-level events"
      organizationId:
        type: string
        nullable: true
        description: "Org context for org-scoped history queries"
      action:
        type: enum
        enum: MembershipEventAction
      actorId:
        type: string
        nullable: true
        description: "Who performed it — User id (leader) or Member id (self). Polymorphic, no FK."
      actorType:
        type: string
        nullable: true
        description: "user, member, or system — disambiguates actorId"
      note:
        type: text
        nullable: true
        description: "Optional reason/message (e.g. rejection reason, join message)"
      metadata:
        type: json
        nullable: true
        description: "Extra context (requestId, role, source, etc.)"
      createdAt:
        type: datetime
        default: now()
    relations:
      member:
        type: many_to_one
        target: Member
        fields: [memberId]
        references: [id]
        onDelete: Cascade
      group:
        type: many_to_one
        target: Group
        fields: [groupId]
        references: [id]
        onDelete: SetNull
        nullable: true
    indexes:
      - fields: [memberId, createdAt]
      - fields: [groupId, createdAt]
      - fields: [organizationId, createdAt]
      - fields: [action]
      - fields: [createdAt]

  # ===========================================================================
  # SMS Campaigns (A2P compliant messaging)
  # ===========================================================================
  SmsCampaign:
    table_name: sms_campaigns
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      slug:
        type: string
        unique: true
        description: "Lookup key, e.g. group-invite, study-invite"
      name:
        type: string
        description: "Human-readable campaign name"
      description:
        type: text
        nullable: true
      messagingServiceSid:
        type: string
        nullable: true
        description: "Twilio Messaging Service SID (MG...) override. Falls back to TWILIO_MESSAGING_SERVICE_SID env var."
      isActive:
        type: boolean
        default: true
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      templates:
        type: one_to_many
        target: SmsTemplate

  SmsTemplate:
    table_name: sms_templates
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      campaignId:
        type: string
      slug:
        type: string
        unique: true
        description: "Lookup key, e.g. group-invite-v1"
      body:
        type: text
        description: "Template with {variable} placeholders"
      requiredProps:
        type: json
        description: "JSON array of required context keys for rendering"
      minIntervalMinutes:
        type: int
        default: 1200
        description: "Min minutes between re-sends to the same phone (default 20hrs)"
      isActive:
        type: boolean
        default: true
      version:
        type: int
        default: 1
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      campaign:
        type: many_to_one
        target: SmsCampaign
        fields: [campaignId]
        references: [id]
        onDelete: Cascade
      logs:
        type: one_to_many
        target: SmsLog
    indexes:
      - fields: [campaignId]

  SmsLog:
    table_name: sms_logs
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      templateId:
        type: string
      recipientPhone:
        type: string
        description: "E.164 phone number"
      messageBody:
        type: text
        description: "The actual rendered message that was sent"
      twilioMessageSid:
        type: string
        nullable: true
      status:
        type: enum
        enum: SmsDeliveryStatus
        default: QUEUED
      statusUpdatedAt:
        type: datetime
        nullable: true
      sentById:
        type: string
        nullable: true
      metadata:
        type: json
        nullable: true
        description: "Context data like groupId, enrollmentId"
      isDevSend:
        type: boolean
        default: false
      errorMessage:
        type: string
        nullable: true
      createdAt:
        type: datetime
        default: now()
    relations:
      template:
        type: many_to_one
        target: SmsTemplate
        fields: [templateId]
        references: [id]
        onDelete: Cascade
      sentBy:
        type: many_to_one
        target: User
        fields: [sentById]
        references: [id]
        name: SmsSender
        onDelete: SetNull
        nullable: true
    indexes:
      - fields: [templateId, recipientPhone, createdAt]
        description: "Rate-limit lookups"
      - fields: [recipientPhone]
      - fields: [status]
      - fields: [twilioMessageSid]
        description: "Webhook lookup by Twilio SID"

# =============================================================================
# Special Tables (Not managed by Prisma)
# =============================================================================
# The `session` table is required for Express session storage (connect-pg-simple).
# It is NOT a Prisma model because connect-pg-simple manages it directly.
#
# CREATE TABLE IF NOT EXISTS session (
#   sid VARCHAR NOT NULL PRIMARY KEY,
#   sess JSON NOT NULL,
#   expire TIMESTAMP(6) NOT NULL
# );
# CREATE INDEX IF NOT EXISTS IDX_session_expire ON session (expire);
#
# Run: npm run db:ensure-session

# =============================================================================
# Seed Version Tracking Table
# =============================================================================
# CREATE TABLE IF NOT EXISTS _seed_versions (
#   version VARCHAR PRIMARY KEY,
#   applied_at TIMESTAMP DEFAULT NOW(),
#   checksum VARCHAR
# );
