# MakeReady Schema Definition
# Source of truth for database schema
# Generates: Atlas HCL (migrations) + Prisma schema (ORM)

version: "1.0"
database: postgresql

imports:
  - enums.yaml
  - extensions.yaml

# Prisma generator configuration
generators:
  client:
    provider: prisma-client-js
    output: ../src/generated/prisma

datasource:
  provider: postgresql
  url: env(DATABASE_URL)
  directUrl: env(DIRECT_URL)

# =============================================================================
# MODELS
# =============================================================================

models:
  # ===========================================================================
  # User & Authentication
  # ===========================================================================
  User:
    table_name: users
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      googleId:
        type: string
        nullable: true
        unique: true
      microsoftId:
        type: string
        nullable: true
        unique: true
        description: "Microsoft Entra ID object ID for Microsoft-authenticated beta/admin users"
      email:
        type: string
        unique: true
      name:
        type: string
      picture:
        type: string
        nullable: true
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
      phoneNumber:
        type: string
        nullable: true
        unique: true
      phoneVerified:
        type: boolean
        default: false
      smsConsent:
        type: boolean
        default: false
        description: "Whether user has consented to receive SMS"
      smsConsentAt:
        type: datetime
        nullable: true
        description: "When SMS consent was last changed"
      organizationId:
        type: string
        nullable: true
        deprecated: true
        deprecation_note: "Use UserRole relation instead"
      isSuperAdmin:
        type: boolean
        default: false
        description: "Platform-wide super admin"
      isActive:
        type: boolean
        default: true
        description: "Inactive users cannot authenticate or access leader/admin app surfaces"
    relations:
      createdGroups:
        type: one_to_many
        target: Group
        name: GroupCreator
      sentInvites:
        type: one_to_many
        target: Invite
      ownedOrganization:
        type: one_to_one
        target: Organization
        name: OrganizationOwner
      roles:
        type: one_to_many
        target: UserRole
      uploadedMedia:
        type: one_to_many
        target: Media
        name: MediaUploader
      videos:
        type: one_to_many
        target: Video
        name: VideoUploader
      highlights:
        type: one_to_many
        target: Highlight
      verseNotes:
        type: one_to_many
        target: VerseNote
      bookmarks:
        type: one_to_many
        target: Bookmark
      createdTemplates:
        type: one_to_many
        target: LessonTemplate
        name: TemplateCreator
      studyPrograms:
        type: one_to_many
        target: StudyProgram
        name: StudyProgramCreator
      enrollments:
        type: one_to_many
        target: Enrollment
        name: EnrollmentCreator
      posts:
        type: one_to_many
        target: Post
        name: PostAuthor
      reviewedJoinRequests:
        type: one_to_many
        target: GroupJoinRequest
        name: JoinRequestReviewer
      createdEvents:
        type: one_to_many
        target: Event
        name: EventCreator
      uploadedAttachments:
        type: one_to_many
        target: EventAttachment
        name: AttachmentUploader
      studyNotes:
        type: one_to_many
        target: StudyNote
      apiKeys:
        type: one_to_many
        target: ApiKey
      previewToken:
        type: one_to_one
        target: PreviewToken
      deviceTokens:
        type: one_to_many
        target: DeviceToken
      notifications:
        type: one_to_many
        target: Notification
      linkedMember:
        type: one_to_one
        target: Member
        name: UserMemberLink
      activities:
        type: one_to_many
        target: Activity
        name: ActivityActor
      targetedActivities:
        type: one_to_many
        target: Activity
        name: ActivityTarget
      updatedGroups:
        type: one_to_many
        target: Group
        name: GroupUpdater
      updatedPrograms:
        type: one_to_many
        target: StudyProgram
        name: StudyProgramUpdater
      updatedEnrollments:
        type: one_to_many
        target: Enrollment
        name: EnrollmentUpdater
      updatedEvents:
        type: one_to_many
        target: Event
        name: EventUpdater
      updatedPosts:
        type: one_to_many
        target: Post
        name: PostUpdater
      updatedTemplates:
        type: one_to_many
        target: LessonTemplate
        name: TemplateUpdater
      preferences:
        type: one_to_many
        target: UserPreference
      searchHistory:
        type: one_to_many
        target: SearchHistory
      createdThemes:
        type: one_to_many
        target: TextTheme
        name: ThemeCreator
      betaApplications:
        type: one_to_many
        target: BetaApplication
      sentSmsLogs:
        type: one_to_many
        target: SmsLog
        name: SmsSender
    indexes:
      - fields: [organizationId]
      - fields: [isSuperAdmin]
      - fields: [isActive]

  DeviceToken:
    table_name: device_tokens
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      userId:
        type: string
      token:
        type: string
        unique: true
      platform:
        type: string
        default: "ios"
        description: "ios or android"
      environment:
        type: string
        default: "production"
        description: "sandbox or production"
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      user:
        type: many_to_one
        target: User
        fields: [userId]
        references: [id]
        onDelete: Cascade
    indexes:
      - fields: [userId]

  # ===========================================================================
  # Groups
  # ===========================================================================
  Group:
    table_name: groups
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      code:
        type: string
        nullable: true
        unique: true
        description: "6-char alphanumeric for public join"
      name:
        type: string
      description:
        type: string
        nullable: true
      coverImageUrl:
        type: string
        nullable: true
      isPrivate:
        type: boolean
        default: false
      allowInvites:
        type: boolean
        default: true
      welcomeMessage:
        type: string
        nullable: true
      ageRangeMin:
        type: int
        nullable: true
      ageRangeMax:
        type: int
        nullable: true
      maxMembers:
        type: int
        nullable: true
      creatorId:
        type: string
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
      organizationId:
        type: string
        nullable: true
      isActive:
        type: boolean
        default: true
      memberDirectoryEnabled:
        type: boolean
        default: true
        description: "Allow members to see contact info of other members"
      updatedById:
        type: string
        nullable: true
        description: "User who last updated this group"
    relations:
      members:
        type: one_to_many
        target: GroupMember
      creator:
        type: many_to_one
        target: User
        fields: [creatorId]
        references: [id]
        name: GroupCreator
        onDelete: Cascade
      updatedBy:
        type: many_to_one
        target: User
        fields: [updatedById]
        references: [id]
        name: GroupUpdater
        onDelete: SetNull
        nullable: true
      invites:
        type: one_to_many
        target: Invite
      media:
        type: one_to_many
        target: Media
      enrollments:
        type: one_to_many
        target: Enrollment
      events:
        type: one_to_many
        target: Event
      posts:
        type: one_to_many
        target: Post
      joinRequests:
        type: one_to_many
        target: GroupJoinRequest
      activities:
        type: one_to_many
        target: Activity
        name: ActivityGroup
      membershipEvents:
        type: one_to_many
        target: MembershipEvent
    indexes:
      - fields: [organizationId]
      - fields: [isActive]
      - fields: [organizationId, isActive]

  GroupMember:
    table_name: group_members
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      groupId:
        type: string
      role:
        type: string
        default: "member"
      joinedAt:
        type: datetime
        default: now()
      memberId:
        type: string
        nullable: true
      isActive:
        type: boolean
        default: true
    relations:
      group:
        type: many_to_one
        target: Group
        fields: [groupId]
        references: [id]
        onDelete: Cascade
      member:
        type: many_to_one
        target: Member
        fields: [memberId]
        references: [id]
        onDelete: Cascade
        nullable: true
      eventAttendance:
        type: one_to_many
        target: EventAttendee
    indexes:
      - fields: [groupId]
      - fields: [memberId]
      - fields: [isActive]
      - fields: [groupId, isActive]
    unique:
      - fields: [groupId, memberId]

  # ===========================================================================
  # Invites
  # ===========================================================================
  Invite:
    table_name: invites
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      token:
        type: string
        unique: true
      groupId:
        type: string
        nullable: true
      inviterId:
        type: string
      recipientPhone:
        type: string
        nullable: true
      status:
        type: string
        default: "pending"
      expiresAt:
        type: datetime
        nullable: true
      createdAt:
        type: datetime
        default: now()
      acceptedAt:
        type: datetime
        nullable: true
    relations:
      group:
        type: many_to_one
        target: Group
        fields: [groupId]
        references: [id]
        onDelete: Cascade
        nullable: true
      inviter:
        type: many_to_one
        target: User
        fields: [inviterId]
        references: [id]
        onDelete: Cascade

  # ===========================================================================
  # Organizations
  # ===========================================================================
  Organization:
    table_name: organizations
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      name:
        type: string
      ownerId:
        type: string
        unique: true
        deprecated: true
        deprecation_note: "Kept for backward compatibility"
      isActive:
        type: boolean
        default: true
      twilioVerifyServiceSid:
        type: string
        nullable: true
        description: "Twilio Verify Service SID for org-branded SMS"
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      members:
        type: one_to_many
        target: MemberOrganization
      owner:
        type: many_to_one
        target: User
        fields: [ownerId]
        references: [id]
        name: OrganizationOwner
        onDelete: Cascade
      roles:
        type: one_to_many
        target: Role
      userRoles:
        type: one_to_many
        target: UserRole
      media:
        type: one_to_many
        target: Media
      themes:
        type: one_to_many
        target: TextTheme
      betaApplications:
        type: one_to_many
        target: BetaApplication
      previewTokens:
        type: one_to_many
        target: PreviewToken
    indexes:
      - fields: [ownerId]
      - fields: [isActive]

  # ===========================================================================
  # Members (Phone-authenticated users)
  # ===========================================================================
  Member:
    table_name: members
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      phoneNumber:
        type: string
        unique: true
      phoneVerified:
        type: boolean
        default: false
      smsConsent:
        type: boolean
        default: false
        description: "Whether member has consented to receive SMS"
      smsConsentAt:
        type: datetime
        nullable: true
        description: "When SMS consent was last changed"
      firstName:
        type: string
        nullable: true
      lastName:
        type: string
        nullable: true
      email:
        type: string
        nullable: true
      gender:
        type: string
        nullable: true
        description: "male or female"
      birthday:
        type: datetime
        nullable: true
      profilePicture:
        type: string
        nullable: true
      isActive:
        type: boolean
        default: true
      lastVerifiedAt:
        type: datetime
        nullable: true
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
      # Google profile linking (for profile sync, NOT authentication)
      googleId:
        type: string
        nullable: true
        unique: true
        description: "Google ID for profile sync (not for auth)"
      googleEmail:
        type: string
        nullable: true
        description: "Email from linked Google account"
      googlePicture:
        type: string
        nullable: true
        description: "Profile picture URL from Google"
      googleLinkedAt:
        type: datetime
        nullable: true
        description: "When Google profile was linked"
      # Account linking (bidirectional User <-> Member)
      userId:
        type: string
        nullable: true
        unique: true
        description: "Links Member to User account for bidirectional access"
      userLinkedAt:
        type: datetime
        nullable: true
        description: "When account was linked to User"
    relations:
      groupMemberships:
        type: one_to_many
        target: GroupMember
      organizations:
        type: one_to_many
        target: MemberOrganization
      joinRequests:
        type: one_to_many
        target: GroupJoinRequest
      studyNotes:
        type: one_to_many
        target: StudyNote
      activityProgress:
        type: one_to_many
        target: MemberActivityProgress
      videoProgress:
        type: one_to_many
        target: MemberVideoProgress
      lessonProgress:
        type: one_to_many
        target: MemberLessonProgress
      linkedUser:
        type: many_to_one
        target: User
        fields: [userId]
        references: [id]
        onDelete: SetNull
        nullable: true
        name: UserMemberLink
      preferences:
        type: one_to_many
        target: UserPreference
      searchHistory:
        type: one_to_many
        target: SearchHistory
      membershipEvents:
        type: one_to_many
        target: MembershipEvent
    indexes:
      - fields: [isActive]
      - fields: [phoneNumber]
      - fields: [googleId]
      - fields: [userId]

  MemberOrganization:
    table_name: member_organizations
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      memberId:
        type: string
      organizationId:
        type: string
      joinedAt:
        type: datetime
        default: now()
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      member:
        type: many_to_one
        target: Member
        fields: [memberId]
        references: [id]
        onDelete: Cascade
      organization:
        type: many_to_one
        target: Organization
        fields: [organizationId]
        references: [id]
        onDelete: Cascade
    indexes:
      - fields: [memberId]
      - fields: [organizationId]
    unique:
      - fields: [memberId, organizationId]

  # ===========================================================================
  # RBAC Models
  # ===========================================================================
  Role:
    table_name: roles
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      name:
        type: string
        description: "Super Admin, Owner, Admin, Group Leader, Contributor"
      description:
        type: string
        nullable: true
      organizationId:
        type: string
        nullable: true
        description: "NULL for system roles"
      isSystem:
        type: boolean
        default: false
        description: "true for predefined roles"
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      organization:
        type: many_to_one
        target: Organization
        fields: [organizationId]
        references: [id]
        onDelete: Cascade
        nullable: true
      permissions:
        type: one_to_many
        target: RolePermission
      userRoles:
        type: one_to_many
        target: UserRole
    indexes:
      - fields: [organizationId]
      - fields: [isSystem]
    unique:
      - fields: [name, organizationId]

  Permission:
    table_name: permissions
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      resource:
        type: string
        description: "organization, group, member, event, announcement, media, form"
      action:
        type: string
        description: "create, read, update, delete, invite, publish"
      name:
        type: string
        unique: true
        description: "organization.update, event.create"
      description:
        type: string
        nullable: true
      createdAt:
        type: datetime
        default: now()
    relations:
      roles:
        type: one_to_many
        target: RolePermission
    indexes:
      - fields: [resource]
      - fields: [action]

  RolePermission:
    table_name: role_permissions
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      roleId:
        type: string
      permissionId:
        type: string
      createdAt:
        type: datetime
        default: now()
    relations:
      role:
        type: many_to_one
        target: Role
        fields: [roleId]
        references: [id]
        onDelete: Cascade
      permission:
        type: many_to_one
        target: Permission
        fields: [permissionId]
        references: [id]
        onDelete: Cascade
    indexes:
      - fields: [roleId]
      - fields: [permissionId]
    unique:
      - fields: [roleId, permissionId]

  UserRole:
    table_name: user_roles
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      userId:
        type: string
      roleId:
        type: string
      organizationId:
        type: string
        description: "Scope of this role assignment"
      assignedAt:
        type: datetime
        default: now()
      assignedBy:
        type: string
        nullable: true
        description: "User ID who assigned this role"
    relations:
      user:
        type: many_to_one
        target: User
        fields: [userId]
        references: [id]
        onDelete: Cascade
      role:
        type: many_to_one
        target: Role
        fields: [roleId]
        references: [id]
        onDelete: Cascade
      organization:
        type: many_to_one
        target: Organization
        fields: [organizationId]
        references: [id]
        onDelete: Cascade
    indexes:
      - fields: [userId]
      - fields: [roleId]
      - fields: [organizationId]
    unique:
      - fields: [userId, roleId, organizationId]

  # ===========================================================================
  # Media & Videos
  # ===========================================================================
  Media:
    table_name: media
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      title:
        type: string
      description:
        type: string
        nullable: true
      url:
        type: string
        description: "Cloud storage URL"
      type:
        type: string
        description: "photo, video, document"
      mimeType:
        type: string
        nullable: true
        description: "image/jpeg, video/mp4, application/pdf"
      fileSize:
        type: int
        nullable: true
        description: "Size in bytes"
      organizationId:
        type: string
      groupId:
        type: string
        nullable: true
        description: "NULL = organization-wide media"
      uploadedBy:
        type: string
      visibility:
        type: string
        default: "members"
        description: "public | members | group"
      videoId:
        type: string
        nullable: true
        description: "FK to Video for Cloudflare Stream media"
      thumbnailUrl:
        type: string
        nullable: true
        description: "Preview thumbnail URL"
      uploadStatus:
        type: string
        default: "ready"
        description: "pending, processing, ready, error"
      source:
        type: string
        nullable: true
        description: "How media entered library: direct, auto_capture, import"
      duration:
        type: int
        nullable: true
        description: "Duration in seconds for video/audio"
      width:
        type: int
        nullable: true
        description: "Image/video width in pixels"
      height:
        type: int
        nullable: true
        description: "Image/video height in pixels"
      aspectRatio:
        type: string
        nullable: true
        description: "Aspect ratio e.g. 16:9, 4:3, 1:1"
      dominantColor:
        type: string
        nullable: true
        description: "Dominant color as hex e.g. #3a5f8c"
      altText:
        type: string
        nullable: true
        description: "Accessibility alt text"
      fileHash:
        type: string
        nullable: true
        description: "SHA-256 hash for deduplication"
      exifData:
        type: json
        nullable: true
        description: "EXIF metadata: camera, GPS, date taken, etc."
      videoResolution:
        type: string
        nullable: true
        description: "Video resolution e.g. 720p, 1080p, 4k"
      isActive:
        type: boolean
        default: true
      createdAt:
        type: datetime
        default: now()
      updatedAt:
        type: datetime
        updatedAt: true
    relations:
      organization:
        type: many_to_one
        target: Organization
        fields: [organizationId]
        references: [id]
        onDelete: Cascade
      group:
        type: many_to_one
        target: Group
        fields: [groupId]
        references: [id]
        onDelete: Cascade
        nullable: true
      uploader:
        type: many_to_one
        target: User
        fields: [uploadedBy]
        references: [id]
        name: MediaUploader
        onDelete: Cascade
      video:
        type: many_to_one
        target: Video
        fields: [videoId]
        references: [id]
        onDelete: SetNull
        nullable: true
      tags:
        type: one_to_many
        target: MediaTag
      usages:
        type: one_to_many
        target: MediaUsage
    indexes:
      - fields: [organizationId]
      - fields: [groupId]
      - fields: [uploadedBy]
      - fields: [visibility]
      - fields: [isActive]
      - fields: [type]
      - fields: [videoId]
      - fields: [uploadStatus]
      # Keyset pagination (media plan M1.1): equality on organizationId plus
      # a range scan over (createdAt, id) keeps cursor pages index-served at
      # any depth. Plain ASC btree — Postgres scans it backward for DESC.
      - fields: [organizationId, createdAt, id]

  # ---------------------------------------------------------------------------
  # Media Tags (free-form taxonomy)
  # ---------------------------------------------------------------------------
  MediaTag:
    table_name: media_tags
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      mediaId:
        type: string
      tag:
        type: string
        description: "Lowercase, trimmed tag string"
      createdAt:
        type: datetime
        default: now()
    relations:
      media:
        type: many_to_one
        target: Media
        fields: [mediaId]
        references: [id]
        onDelete: Cascade
    indexes:
      - fields: [mediaId]
      - fields: [tag]
    unique:
      - fields: [mediaId, tag]

  # ---------------------------------------------------------------------------
  # Media Usage Tracking (where media is used)
  # ---------------------------------------------------------------------------
  MediaUsage:
    table_name: media_usages
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      mediaId:
        type: string
      usageType:
        type: string
        description: "LESSON_ACTIVITY, PROGRAM_COVER, GROUP_COVER, POST, SCHEDULED_ACTIVITY"
      resourceId:
        type: string
        description: "ID of the resource using this media"
      resourceName:
        type: string
        nullable: true
        description: "Human-readable name for display"
      createdAt:
        type: datetime
        default: now()
    relations:
      media:
        type: many_to_one
        target: Media
        fields: [mediaId]
        references: [id]
        onDelete: Cascade
    indexes:
      - fields: [mediaId]
      - fields: [usageType]
      - fields: [resourceId]
    unique:
      - fields: [mediaId, usageType, resourceId]

  Video:
    table_name: videos
    fields:
      id:
        type: uuid
        primary: true
        default: uuid()
      title:
        type: string
        nullable: true
      description:
        type: string
        nullable: true
      cloudflareUid:
        type: string
        unique: true
        description: "Cloudflare video UID"
      playbackUrl:
        type: string
        description: "HLS playback URL"
      thumbnailUrl:
        type: string
        nullable: true
        description: "Auto-generated thumbnail"
      duration:
        type: int
        nullable: true
        description: "Duration in seconds"
