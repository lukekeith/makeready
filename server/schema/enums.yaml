# Enum Definitions for MakeReady
# These are converted to both PostgreSQL enums and Prisma enums

version: "1.0"

enums:
  Testament:
    values:
      - OLD_TESTAMENT
      - NEW_TESTAMENT

  HighlightColor:
    values:
      - YELLOW
      - BLUE
      - GREEN
      - ORANGE
      - PURPLE
      - PINK

  TemplateActivityType:
    values:
      - USER_INPUT
      - READ
      - VIDEO
      - YOUTUBE
      - EXEGESIS

  EventType:
    values:
      - LESSON     # Daily study lesson from enrollment
      - MEETING    # In-person gathering
      - ONLINE     # Virtual meeting
      - DEADLINE   # Due dates, reminders
      - SOCIAL     # Social gatherings
      - OTHER      # Catch-all

  EventVisibility:
    values:
      - PRIVATE    # Group members only
      - PUBLIC     # Anyone with link can attend

  RsvpStatus:
    values:
      - GOING
      - MAYBE
      - NOT_GOING
      - PENDING    # Default for invited attendees

  RecurrenceFrequency:
    values:
      - NONE
      - DAILY
      - WEEKLY
      - BIWEEKLY   # Every 2 weeks
      - MONTHLY
      - YEARLY

  PostType:
    values:
      - WELCOME       # Auto-generated on enrollment
      - POLL          # Poll with options
      - VIDEO         # Video post
      - EVENT         # Event announcement
      - ANNOUNCEMENT  # General announcement

  LogCategory:
    values:
      - AUTH     # Authentication events
      - JOIN     # Join events (groups, events, studies)
      - ACCESS   # Resource access

  LogStatus:
    values:
      - SUCCESS
      - FAILURE
      - WARNING

  ActivityAction:
    values:
      - CREATED
      - UPDATED
      - DELETED
      - JOINED
      - LEFT
      - PUBLISHED
      - ENROLLED
      - COMPLETED
      - SUBMITTED
      - SENT
      - NOTIFIED

  SmsDeliveryStatus:
    values:
      - QUEUED
      - SENT
      - DELIVERED
      - UNDELIVERED
      - FAILED

  BetaApplicationStatus:
    values:
      - PENDING
      - APPROVED
      - REJECTED
      - WITHDRAWN

  # Immutable membership audit trail. Every transition a member goes through
  # within a group/org is appended to MembershipEvent so a leader can review
  # (and reverse) past decisions — nobody is ever lost.
  MembershipEventAction:
    values:
      - INVITED         # Leader sent an invite to the member
      - REQUESTED       # Member requested to join a group (incl. re-requests)
      - APPROVED        # Leader approved a join request
      - REJECTED        # Leader rejected a join request
      - ADDED           # Leader added the member directly to a group
      - REJOINED        # Inactive group membership reactivated (re-add)
      - REMOVED_GROUP   # Member removed from a single group
      - REMOVED_ORG     # Member removed from the entire organization
