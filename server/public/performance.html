<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance - MakeReady API</title>
  <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0D101A;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .header img {
      width: 40px;
      height: 40px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .header .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-left: auto;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .status-chip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    .status-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6b7280;
    }

    .status-chip .dot.green { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.4); }
    .status-chip .dot.red { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.4); }

    .status-chip .label { color: rgba(255,255,255,0.5); }
    .status-chip .value { color: #fff; font-weight: 500; }

    /* Ping section */
    .section { margin-bottom: 2rem; }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.75rem;
    }

    .ping-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
    }

    .ping-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }

    .ping-card .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.25rem;
    }

    .ping-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .ping-card .unit {
      font-size: 0.85rem;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
    }

    /* Ping sparkline */
    .ping-sparkline {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 32px;
      margin-top: 0.75rem;
      padding: 0 0.25rem;
    }

    .ping-sparkline .bar {
      flex: 1;
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      transition: height 0.3s ease;
    }

    /* Query table */
    .query-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 0.5rem;
    }

    .query-table th {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.4);
      text-align: left;
      padding: 0 1rem 0.25rem;
      font-weight: 500;
    }

    .query-table th:last-child { text-align: right; }

    .query-row {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      transition: background 0.2s;
    }

    .query-row:hover { background: rgba(255,255,255,0.08); }

    .query-row td {
      padding: 1rem;
    }

    .query-row td:first-child { border-radius: 10px 0 0 10px; }
    .query-row td:last-child { border-radius: 0 10px 10px 0; text-align: right; }

    .query-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    .query-desc {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }

    .query-category {
      display: inline-block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
    }

    .cat-bible { background: rgba(99,102,241,0.2); color: #818cf8; }
    .cat-auth { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .cat-app { background: rgba(16,185,129,0.2); color: #34d399; }

    .query-time {
      font-size: 1.25rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .query-time .unit {
      font-size: 0.8rem;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
    }

    /* Time bar */
    .time-bar-container {
      width: 120px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 0.4rem;
      margin-left: auto;
    }

    .time-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* Colors based on speed */
    .speed-fast { color: #10b981; }
    .speed-good { color: #34d399; }
    .speed-ok { color: #fbbf24; }
    .speed-slow { color: #ef4444; }

    .bar-fast { background: #10b981; }
    .bar-good { background: #34d399; }
    .bar-ok { background: #fbbf24; }
    .bar-slow { background: #ef4444; }

    /* Actions */
    .actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 2rem;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(108,71,255,0.5); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:disabled:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }

    .btn-primary {
      background: rgba(108,71,255,0.2);
      border-color: rgba(108,71,255,0.4);
    }

    .btn-primary:hover { background: rgba(108,71,255,0.3); }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .timestamp {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
      margin-left: auto;
    }

    /* Loading state */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 0;
      gap: 1rem;
    }

    .loading-overlay .spinner { width: 24px; height: 24px; }

    .loading-text {
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
    }

    /* Footer */
    .footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }

    .footer a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
    }

    .footer a:hover { color: #fff; }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .ping-grid { grid-template-columns: repeat(2, 1fr); }
      .status-bar { gap: 0.75rem; }
      .time-bar-container { width: 80px; }
      .query-table th:nth-child(2),
      .query-row td:nth-child(2) { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="/logo-mark.svg" alt="MakeReady">
      <h1>Performance</h1>
      <span class="subtitle" id="server-info">Loading...</span>
    </div>

    <!-- Status bar -->
    <div class="status-bar" id="status-bar">
      <div class="status-chip">
        <span class="dot" id="db-dot"></span>
        <span class="label">Database</span>
        <span class="value" id="db-status-text">--</span>
      </div>
      <div class="status-chip">
        <span class="label">Host</span>
        <span class="value" id="db-host">--</span>
      </div>
      <div class="status-chip">
        <span class="label">SSL</span>
        <span class="value" id="db-ssl">--</span>
      </div>
      <div class="status-chip">
        <span class="label">Pool</span>
        <span class="value" id="db-pool">--</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" id="run-btn" onclick="runBenchmark()">
        Run Benchmark
      </button>
      <button class="btn" id="auto-btn" onclick="toggleAuto()">
        Auto-refresh: Off
      </button>
      <span class="timestamp" id="timestamp"></span>
    </div>

    <!-- Content area -->
    <div id="content">
      <div class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Running initial benchmark...</div>
      </div>
    </div>

    <div class="footer">
      <span>MakeReady API</span>
      <a href="/api/status/perf" target="_blank">Raw JSON</a>
    </div>
  </div>

  <script>
    let autoRefresh = false;
    let autoInterval = null;
    let isRunning = false;

    function speedClass(ms) {
      if (ms < 5) return 'fast';
      if (ms < 15) return 'good';
      if (ms < 50) return 'ok';
      return 'slow';
    }

    function barColor(ms) {
      return 'bar-' + speedClass(ms);
    }

    function sparklineColor(ms, maxMs) {
      return barColor(ms);
    }

    function renderResults(data) {
      const maxQueryTime = Math.max(...data.queries.map(q => q.time), 1);

      // Status bar
      document.getElementById('db-dot').className = 'dot green';
      document.getElementById('db-status-text').textContent = 'Connected';
      document.getElementById('db-host').textContent = data.connection.host;
      document.getElementById('db-ssl').textContent = data.connection.ssl;
      document.getElementById('db-pool').textContent = data.connection.poolSize;
      document.getElementById('server-info').textContent = `Uptime will show on /api/status`;

      // Timestamp
      const ts = new Date(data.timestamp);
      document.getElementById('timestamp').textContent =
        `Last run: ${ts.toLocaleTimeString()}`;

      // Build content
      const maxPing = Math.max(...data.ping.samples, 1);

      let html = '';

      // Ping section
      html += `
        <div class="section">
          <div class="section-title">Database Ping (10 samples)</div>
          <div class="ping-grid">
            <div class="ping-card">
              <div class="label">Min</div>
              <div class="value speed-${speedClass(data.ping.min)}">${data.ping.min}<span class="unit">ms</span></div>
            </div>
            <div class="ping-card">
              <div class="label">Avg</div>
              <div class="value speed-${speedClass(data.ping.avg)}">${data.ping.avg}<span class="unit">ms</span></div>
            </div>
            <div class="ping-card">
              <div class="label">P95</div>
              <div class="value speed-${speedClass(data.ping.p95)}">${data.ping.p95}<span class="unit">ms</span></div>
            </div>
            <div class="ping-card">
              <div class="label">Max</div>
              <div class="value speed-${speedClass(data.ping.max)}">${data.ping.max}<span class="unit">ms</span></div>
            </div>
          </div>
          <div class="ping-sparkline">
            ${data.ping.samples.map(s =>
              `<div class="bar ${barColor(s)}" style="height: ${Math.max((s / maxPing) * 100, 8)}%"
                    title="${s}ms"></div>`
            ).join('')}
          </div>
        </div>
      `;

      // Queries section
      html += `
        <div class="section">
          <div class="section-title">Critical Queries</div>
          <table class="query-table">
            <thead>
              <tr>
                <th>Query</th>
                <th>Category</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody>
      `;

      for (const q of data.queries) {
        const sc = speedClass(q.time);
        const catClass = q.category === 'bible' ? 'cat-bible' : q.category === 'auth' ? 'cat-auth' : 'cat-app';
        const barWidth = Math.max((q.time / maxQueryTime) * 100, 3);

        html += `
          <tr class="query-row">
            <td>
              <div class="query-name">${q.name}</div>
              <div class="query-desc">${q.description}</div>
            </td>
            <td>
              <span class="query-category ${catClass}">${q.category}</span>
            </td>
            <td>
              <div class="query-time speed-${sc}">${q.time}<span class="unit">ms</span></div>
              <div class="time-bar-container">
                <div class="time-bar bar-${sc}" style="width: ${barWidth}%"></div>
              </div>
            </td>
          </tr>
        `;
      }

      html += `
            </tbody>
          </table>
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    function renderError(msg) {
      document.getElementById('db-dot').className = 'dot red';
      document.getElementById('db-status-text').textContent = 'Error';
      document.getElementById('content').innerHTML = `
        <div class="loading-overlay">
          <div style="color: #ef4444; font-size: 1.1rem;">Benchmark failed</div>
          <div class="loading-text">${msg}</div>
        </div>
      `;
    }

    async function runBenchmark() {
      if (isRunning) return;
      isRunning = true;

      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Running...';

      try {
        const resp = await fetch('/api/status/perf');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        if (data.error) throw new Error(data.error);
        renderResults(data);
      } catch (err) {
        renderError(err.message);
      } finally {
        isRunning = false;
        btn.disabled = false;
        btn.innerHTML = 'Run Benchmark';
      }
    }

    function toggleAuto() {
      autoRefresh = !autoRefresh;
      const btn = document.getElementById('auto-btn');

      if (autoRefresh) {
        btn.textContent = 'Auto-refresh: On (30s)';
        autoInterval = setInterval(runBenchmark, 30000);
      } else {
        btn.textContent = 'Auto-refresh: Off';
        clearInterval(autoInterval);
        autoInterval = null;
      }
    }

    // Run on page load
    runBenchmark();
  </script>
</body>
</html>
