name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch/PR (saves minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, zip, gd, bcmath
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Dependency caching ──────────────────────────────────────────
      # Keyed on lockfiles so caches auto-bust when deps change.
      # To force a full refresh: push a commit that touches the lockfile,
      # or manually delete the cache in GitHub → Actions → Caches.

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --optimize-autoloader

      - name: Install NPM dependencies and build assets
        run: npm install --no-audit --no-fund --legacy-peer-deps && npm run build

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run PHP tests
        run: php artisan test

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [build-and-test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-${{ hashFiles('Dockerfile', 'composer.lock', 'package-lock.json') }}
          restore-keys: docker-${{ runner.os }}-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: makeready-client:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Rotate cache to avoid unbounded growth
      - name: Rotate Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Smoke test — Laravel /up health route
        run: |
          docker run -d -p 8080:8080 \
            -e PORT=8080 \
            -e APP_KEY=base64:dGVzdGtleTEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI= \
            -e APP_ENV=testing \
            -e API_URL=https://api.makeready.org \
            -e SESSION_DRIVER=file \
            --name test-container makeready-client:test

          # Poll for readiness instead of fixed sleep
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/up > /dev/null 2>&1; then
              echo "Container ready after ~${i}s"
              break
            fi
            sleep 1
          done

          curl -v http://localhost:8080/up || (docker logs test-container && exit 1)
          docker stop test-container
