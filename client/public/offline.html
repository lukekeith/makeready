<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d101a">
  <title>MakeReady — Offline</title>
  <link rel="icon" type="image/svg+xml" href="/logo-mark.svg">
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; height: 100%;
      background: #0d101a; color: #fff;
      font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      min-height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-align: center;
      padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
    }
    img { width: 72px; height: 72px; opacity: 0.9; }
    h1 { font-size: 22px; font-weight: 700; margin: 0; }
    p { font-size: 14px; color: rgba(255,255,255,0.7); max-width: 30ch; margin: 0; line-height: 1.5; }
    button {
      margin-top: 8px;
      background: #6c47ff; color: #fff; border: 0;
      padding: 12px 24px; border-radius: 9999px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/logo-mark.svg" alt="MakeReady">
    <h1>You're offline</h1>
    <p>MakeReady needs a connection for this screen. Your last-loaded pages still work.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
