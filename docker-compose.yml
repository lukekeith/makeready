services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: makeready-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: makeready_dev
    ports:
      - "5434:5432"
    volumes:
      - makeready_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: makeready-server
    ports:
      - "3010:3010"
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
      - ./server/atlas:/app/atlas
      - /app/src/generated/prisma
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 3010
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/makeready_dev
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/makeready_dev
      CLIENT_URL: http://localhost:8000
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: makeready-client
    ports:
      - "8000:8000"
      - "5174:5174"
    volumes:
      - ./client/app:/var/www/html/app
      - ./client/resources:/var/www/html/resources
      - ./client/routes:/var/www/html/routes
      - ./client/config:/var/www/html/config
    env_file:
      - ./client/.env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      API_URL: http://server:3010
      VITE_HOST: "0.0.0.0"
      VITE_PORT: "5174"
    depends_on:
      - server

volumes:
  makeready_postgres_data:
